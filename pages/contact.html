<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/contact.css">
    <title>Contact - Qaiyyum's Portfolio</title>
</head>
<body>
    <header></header>

    <main>
        <section id="contact-section" class="section diff">
            <div class="contact-container">
                <!-- Contact Info -->
                <div class="contact-info">
                    <h2>Let’s Colaborate!</h2>
                    <p>
                        Have a project, idea, or just want to connect? I’m open to exciting opportunities across various fields. 
                        Let’s create something amazing together!
                    </p>                                           
                </div>
        
                <!-- Contact Form -->
                <div class="contact-form">
                    <h3>Send a Message</h3>
                    <form action="https://formsubmit.co/qaiyyumkamal.work@gmail.com" method="POST" enctype="multipart/form-data" id="contact-form">
                        <input type="hidden" name="_captcha" value="false">
                    
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required>
                    
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>
                    
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" required>
                    
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    
                        <button type="submit" id="submit-btn" disabled>Send</button>
                    </form>               
                </div>
            </div>
        </section>
    </main>

    <footer></footer>
    <script src="../assets/js/script.js"></script>
</body>
</html>
